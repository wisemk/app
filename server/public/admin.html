<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>소액뱅크 콘텐츠 관리자</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fc;
        --bg-2: #eaf1fb;
        --surface: rgba(255, 255, 255, 0.96);
        --surface-2: #ffffff;
        --ink: #162236;
        --muted: #64748b;
        --line: #d8e2f0;
        --green: #2563eb;
        --green-soft: #e8f0ff;
        --orange: #3b82f6;
        --orange-soft: #eff6ff;
        --danger: #b93838;
        --danger-soft: #fff1f1;
        --shadow: 0 18px 44px rgba(15, 23, 42, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", "Apple SD Gothic Neo", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255,255,255,0.95), transparent 28%),
          linear-gradient(180deg, #ffffff 0%, var(--bg) 56%, var(--bg-2) 100%);
      }
      button, input, textarea { font: inherit; }
      button { cursor: pointer; }
      .page { width: min(1380px, calc(100% - 28px)); margin: 0 auto; padding: 28px 0 88px; }
      .shell {
        display: grid; grid-template-columns: 280px minmax(0, 1fr); gap: 18px; align-items: start;
      }
      .sidebar {
        display: grid; gap: 12px;
      }
      .brand-panel,
      .sidebar-panel:has(#summary-brand) {
        display: none;
      }
      .sidebar-panel, details.section {
        overflow: hidden; border: 1px solid var(--line); border-radius: 30px;
        background: var(--surface); box-shadow: var(--shadow);
      }
      .sidebar-panel {
        padding: 20px;
      }
      .eyebrow {
        display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 900;
        letter-spacing: 0.08em; text-transform: uppercase; color: var(--orange);
      }
      .sidebar-title {
        margin: 8px 0 0; font-size: 28px; line-height: 1.05; font-weight: 900;
      }
      h1 { margin: 10px 0; font-size: clamp(31px, 5vw, 43px); line-height: 1.08; }
      .panel-kicker {
        font-size: 12px; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: var(--orange);
        margin-bottom: 12px;
      }
      .workspace { display: grid; gap: 18px; min-width: 0; }
      .toolbar, .summary-actions, .field-actions, .item-controls, .sidebar-actions {
        display: flex; flex-wrap: wrap; gap: 8px;
      }
      .toolbar { flex-direction: column; align-items: stretch; margin-top: 14px; gap: 10px; }
      .toolbar-meta, .toolbar-actions {
        display: flex; flex-wrap: wrap; gap: 8px;
      }
      .action-panel::before {
        content: '콘텐츠 관리';
        display: block;
        margin: 8px 0 14px;
        font-size: 28px;
        line-height: 1.05;
        font-weight: 900;
        color: var(--ink);
      }
      .action-panel .panel-kicker {
        display: none;
      }
      .action-panel .nav-list {
        margin-top: 14px;
      }
      .sidebar-actions { margin-top: 12px; }
      .pill, .status {
        display: inline-flex; align-items: center; min-height: 42px; padding: 10px 14px;
        border-radius: 999px; font-size: 13px; font-weight: 800;
      }
      .pill { background: var(--green-soft); color: #1d4ed8; }
      .status { background: rgba(255,255,255,0.76); border: 1px solid var(--line); color: var(--muted); width: 100%; }
      .status.dirty { background: var(--green-soft); color: var(--green); }
      .status.error { background: var(--danger-soft); color: var(--danger); }
      .button {
        min-height: 46px; padding: 0 18px; border-radius: 18px; border: 0; font-weight: 900;
        transition: transform .12s ease, opacity .12s ease;
      }
      .button:hover { transform: translateY(-1px); }
      .button:active { transform: translateY(0); }
      .button:disabled { cursor: wait; opacity: 0.55; transform: none; }
      .button.primary { background: var(--green); color: #fff; }
      .button.secondary { background: var(--surface-2); color: #1d4ed8; border: 1px solid var(--line); }
      .button.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); }
      .button.small { min-height: 38px; padding: 0 12px; border-radius: 14px; font-size: 13px; }
      .summary-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
      .summary-card, .panel, .item {
        border: 1px solid var(--line); border-radius: 24px; background: rgba(255,255,255,0.9);
      }
      .summary-card { min-height: 0; padding: 18px; display: flex; flex-direction: column; gap: 10px; }
      .summary-label { font-size: 12px; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: var(--orange); }
      .summary-value { font-size: 22px; line-height: 1.25; font-weight: 900; word-break: break-word; }
      .summary-detail { font-size: 13px; line-height: 1.58; color: var(--muted); word-break: break-word; }
      .info-row, .label-row {
        display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap;
      }
      .label-row {
        align-items: center;
      }
      .info-wrap {
        position: relative; display: inline-flex; align-items: center;
      }
      .info-button {
        width: 22px; height: 22px; padding: 0; border-radius: 999px; border: 1px solid #bfdbfe;
        background: #eff6ff; color: #2563eb; font-size: 12px; font-weight: 900;
        display: inline-flex; align-items: center; justify-content: center; line-height: 1;
      }
      .info-button:hover {
        background: #dbeafe;
      }
      .info-button:focus {
        outline: 2px solid rgba(37,99,235,0.16);
        outline-offset: 2px;
      }
      .info-tooltip {
        position: absolute; top: 50%; left: calc(100% + 8px); transform: translateY(-50%);
        width: min(280px, 60vw); padding: 11px 13px; border-radius: 14px; background: #162236;
        color: #f8fbff; font-size: 12px; line-height: 1.6; box-shadow: 0 16px 30px rgba(15, 23, 42, 0.18);
        opacity: 0; pointer-events: none; transition: opacity .12s ease; z-index: 30;
      }
      .info-wrap:hover .info-tooltip,
      .info-wrap:focus-within .info-tooltip,
      .info-wrap[data-open="true"] .info-tooltip {
        opacity: 1; pointer-events: auto;
      }
      .nav-list { display: grid; gap: 10px; }
      .nav-link {
        width: 100%; padding: 14px 15px; text-align: left; border-radius: 20px; border: 1px solid var(--line);
        background: rgba(255,255,255,0.92); color: var(--ink);
        transition: border-color .12s ease, transform .12s ease, background-color .12s ease;
      }
      .nav-link:hover { transform: translateY(-1px); border-color: #93c5fd; background: #f8fbff; }
      .nav-link-title { display: block; font-size: 15px; font-weight: 900; }
      .sections { display: grid; gap: 18px; }
      summary.section-head {
        list-style: none; display: flex; justify-content: space-between; gap: 14px; align-items: center;
        padding: 18px 22px; cursor: pointer;
      }
      summary.section-head::-webkit-details-marker { display: none; }
      .section-title { font-size: 22px; font-weight: 900; }
      .section-badge {
        min-width: 52px; min-height: 48px; padding: 0 14px; border-radius: 18px; background: var(--green);
        color: #fff; font-size: 14px; font-weight: 900; display: inline-flex; align-items: center; justify-content: center;
      }
      .section-body { padding: 0 22px 22px; display: grid; gap: 16px; }
      .panel { padding: 18px; background: var(--surface-2); }
      .panel-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
      .panel-title { font-size: 17px; font-weight: 900; }
      .grid { display: grid; gap: 14px; }
      .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .field { display: grid; gap: 7px; }
      .field label { font-size: 13px; font-weight: 900; color: #24446f; }
      .field input, .field textarea {
        width: 100%; padding: 13px 15px; border-radius: 16px; border: 1px solid var(--line);
        background: #ffffff; color: var(--ink);
      }
      .field textarea { min-height: 116px; line-height: 1.64; resize: vertical; }
      .field input:focus, .field textarea:focus {
        outline: 2px solid rgba(37,99,235,0.16); border-color: #60a5fa;
      }
      .preview { margin-top: 8px; padding: 14px; border-radius: 18px; border: 1px solid var(--line); background: #f8fbff; }
      .preview img {
        display: block; width: 100%; max-height: 240px; object-fit: cover; border-radius: 14px; background: #eaf1fb;
      }
      .preview p { margin: 8px 0 0; font-size: 12px; line-height: 1.5; color: var(--muted); }
      .stack { display: grid; gap: 14px; }
      .item { padding: 16px; background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%); }
      .item-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
      .item-title { font-size: 15px; font-weight: 900; }
      .empty { padding: 16px; border-radius: 18px; border: 1px dashed #bfd3eb; color: var(--muted); background: #f8fbff; }
      .push-console { padding: 20px; }
      .push-console-grid { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr); gap: 16px; }
      .template-chips { display: flex; flex-wrap: wrap; gap: 8px; }
      .campaign-list { display: grid; gap: 12px; }
      .campaign-row {
        padding: 14px; border-radius: 18px; border: 1px solid var(--line); background: #f8fbff;
        display: grid; gap: 10px;
      }
      .campaign-row-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
      .campaign-name { font-size: 15px; font-weight: 900; }
      .campaign-message { font-size: 13px; line-height: 1.6; color: var(--muted); }
      .campaign-metrics { display: flex; flex-wrap: wrap; gap: 8px; font-size: 12px; color: var(--muted); }
      .campaign-pill {
        display: inline-flex; align-items: center; min-height: 30px; padding: 6px 10px; border-radius: 999px;
        background: #eff6ff; color: #2563eb; font-size: 12px; font-weight: 800;
      }
      .footer { margin-top: 18px; text-align: center; color: var(--muted); font-size: 13px; line-height: 1.7; }
      @media (max-width: 1120px) {
        .shell { grid-template-columns: 1fr; }
        .sidebar { position: static; grid-template-columns: 1fr; }
        .info-tooltip {
          top: calc(100% + 8px); left: 0; transform: none; width: min(240px, calc(100vw - 56px));
        }
      }
      @media (max-width: 720px) {
        .page { width: min(100% - 18px, 100%); padding-top: 18px; }
        .sidebar-panel, .section-body { padding-left: 16px; padding-right: 16px; }
        .panel-head, .item-head, summary.section-head { flex-direction: column; align-items: stretch; }
        .grid.two { grid-template-columns: 1fr; }
        .push-console-grid { grid-template-columns: 1fr; }
        .info-tooltip {
          top: calc(100% + 8px); left: 0; transform: none; width: min(240px, calc(100vw - 56px));
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="shell">
        <aside class="sidebar">
          <section class="sidebar-panel brand-panel">
            <div class="eyebrow">Content Admin</div>
            <h1>콘텐츠 관리</h1>
          </section>

          <section class="sidebar-panel action-panel">
            <div class="panel-kicker">저장</div>
            <div class="status" id="status-text">서버 내용을 불러오는 중...</div>
            <div class="toolbar">
              <span class="pill" id="schema-badge">schema v-</span>
              <span class="pill" id="updated-badge">updated -</span>
              <button class="button secondary" id="reload-button" type="button">다시 불러오기</button>
              <button class="button secondary" id="repo-sync-button" type="button">배포 기준 반영</button>
              <button class="button primary" id="save-button" type="button">저장하기</button>
            </div>
          </section>

          <section class="sidebar-panel">
            <div class="panel-kicker">섹션</div>
            <div class="nav-list" id="nav-root"></div>
          </section>

          <section class="sidebar-panel">
            <div class="panel-kicker">운영값</div>
            <div class="summary-grid">
              <article class="summary-card">
                <div class="summary-label">브랜드</div>
                <div class="summary-value" id="summary-brand">-</div>
              </article>
              <article class="summary-card">
                <div class="summary-label">전화</div>
                <div class="summary-value" id="summary-phone">-</div>
              </article>
              <article class="summary-card">
                <div class="summary-label">상세</div>
                <div class="summary-value">링크</div>
                <div class="summary-detail" id="summary-detail-url">-</div>
                <div class="summary-actions">
                  <button class="button secondary small" id="summary-detail-button" type="button">열기</button>
                </div>
              </article>
              <article class="summary-card">
                <div class="summary-label">상담</div>
                <div class="summary-value">링크</div>
                <div class="summary-detail" id="summary-chat-url">-</div>
                <div class="summary-actions">
                  <button class="button secondary small" id="summary-chat-button" type="button">열기</button>
                </div>
              </article>
            </div>
          </section>
        </aside>

        <div class="workspace">
          <details class="section push-console-section" data-section-id="push-console">
            <summary class="section-head">
              <div>
                <div class="section-title">푸시 발송</div>
              </div>
              <div class="section-badge">실행</div>
            </summary>
            <div class="section-body">
              <div class="push-console-grid">
              <article class="summary-card">
                <div class="summary-label">즉시 발송</div>
                <div class="grid">
                  <div class="field">
                    <div class="label-row"><label for="push-title-input">캠페인 제목</label></div>
                    <input id="push-title-input" type="text" placeholder="예: 월말 안내" />
                  </div>
                  <div class="field">
                    <div class="label-row"><label for="push-message-input">푸시 메시지</label></div>
                    <textarea id="push-message-input" placeholder="휴대폰에 보낼 문구를 입력하세요."></textarea>
                  </div>
                  <div class="field">
                    <div class="label-row"><label for="push-audience-input">대상 라벨</label></div>
                    <input id="push-audience-input" type="text" value="푸시 허용 고객" />
                  </div>
                  <div class="field">
                    <div class="label-row"><label>콘텐츠 템플릿</label></div>
                    <div class="template-chips" id="push-template-root"></div>
                  </div>
                </div>
                <div class="field-actions">
                  <button class="button secondary small" id="push-draft-button" type="button">초안 저장</button>
                  <button class="button primary small" id="push-send-button" type="button">지금 발송</button>
                  <button class="button secondary small" id="push-receipt-sync-button" type="button">발송 결과 확인</button>
                </div>
                <div class="status" id="push-status-text">푸시 상태를 불러오는 중...</div>
              </article>
              <article class="summary-card">
                <div class="summary-label">최근 캠페인</div>
                <div class="campaign-list" id="push-campaign-list"></div>
              </article>
              </div>
            </div>
          </details>
          <section class="sections" id="editor-root"></section>
        </div>
      </div>
    </main>

    <script>
      const editorRoot = document.getElementById('editor-root');
      const statusText = document.getElementById('status-text');
      const schemaBadge = document.getElementById('schema-badge');
      const updatedBadge = document.getElementById('updated-badge');
      const reloadButton = document.getElementById('reload-button');
      const repoSyncButton = document.getElementById('repo-sync-button');
      const saveButton = document.getElementById('save-button');
      const summaryBrand = document.getElementById('summary-brand');
      const summaryPhone = document.getElementById('summary-phone');
      const summaryDetailUrl = document.getElementById('summary-detail-url');
      const summaryChatUrl = document.getElementById('summary-chat-url');
      const summaryDetailButton = document.getElementById('summary-detail-button');
      const summaryChatButton = document.getElementById('summary-chat-button');
      const navRoot = document.getElementById('nav-root');
      const actionPanel = document.querySelector('.action-panel');
      const brandPanel = document.querySelector('.brand-panel');
      const navPanel = navRoot?.closest('.sidebar-panel');
      const summaryPanel = summaryBrand?.closest('.sidebar-panel');
      const pushTitleInput = document.getElementById('push-title-input');
      const pushMessageInput = document.getElementById('push-message-input');
      const pushAudienceInput = document.getElementById('push-audience-input');
      const pushTemplateRoot = document.getElementById('push-template-root');
      const pushDraftButton = document.getElementById('push-draft-button');
      const pushSendButton = document.getElementById('push-send-button');
      const pushReceiptSyncButton = document.getElementById('push-receipt-sync-button');
      const pushStatusText = document.getElementById('push-status-text');
      const pushCampaignList = document.getElementById('push-campaign-list');

      let currentContent = null;
      let recentPushCampaigns = [];
      let isDirty = false;
      let isLoading = false;
      let isSaving = false;
      let isSyncing = false;
      let isPushLoading = false;
      let isPushSaving = false;
      let isPushSending = false;
      let isPushReceiptSyncing = false;
      let tooltipIdCounter = 0;
      const openSections = new Set();
      const pushConsoleSection = document.querySelector(
        'details.section[data-section-id="push-console"]',
      );

      if (brandPanel) {
        brandPanel.remove();
      }

      if (navRoot && actionPanel && navPanel && navPanel !== actionPanel) {
        actionPanel.appendChild(navRoot);
        navPanel.remove();
      }

      if (summaryPanel) {
        summaryPanel.remove();
      }

      if (pushConsoleSection) {
        pushConsoleSection.addEventListener('toggle', () => {
          if (pushConsoleSection.open) openSections.add('push-console');
          else openSections.delete('push-console');
        });
      }

      const SECTION_CONFIG = [
        {
          id: 'business',
          title: '운영 기본 정보',
          description: '브랜드명, 운영시간, 전화번호, 상세페이지 링크처럼 가장 자주 바꾸는 값입니다.',
          blocks: [
            {
              type: 'object',
              path: 'business',
              title: '기본 운영 정보',
              description: '첫 화면 버튼과 고객센터 영역이 이 값을 사용합니다.',
              columns: 2,
              fields: [
                { key: 'brandName', label: '브랜드명', hint: '메인 제목과 고객센터에 같이 표시됩니다.' },
                { key: 'businessHours', label: '운영시간', hint: '예: 매일 09:00 - 24:00' },
                { key: 'phoneNumber', label: '전화번호', hint: '전화 문의 버튼에 연결됩니다.', kind: 'tel' },
                { key: 'detailPageUrl', label: '상세페이지 링크', hint: '상세 보기 버튼이 여는 주소입니다.', kind: 'url' },
                { key: 'channelTalkUrl', label: '상담 링크', hint: '상담 채팅 버튼이 여는 주소입니다.', kind: 'url' },
              ],
            },
          ],
        },
        {
          id: 'home',
          title: '첫 화면 문구',
          description: '앱 상단 제목, 설명, 배지를 관리합니다.',
          blocks: [
            {
              type: 'object',
              path: 'home',
              title: '메인 카피',
              description: '고객이 앱을 열자마자 보는 헤드라인입니다.',
              fields: [
                { key: 'title', label: '메인 제목', hint: '앱 상단에서 가장 크게 보입니다.' },
                { key: 'subtitle', label: '메인 설명', hint: '상단 설명 문구입니다.', multiline: true },
              ],
            },
            {
              type: 'string-array',
              path: 'home.badges',
              title: '상단 배지',
              description: '작은 캡슐형 문구입니다.',
              itemLabel: '배지',
              addLabel: '배지 추가',
              template: '새 배지',
              minItems: 1,
              hint: '예: 24시간 상담, 빠른 입금',
            },
          ],
        },
        {
          id: 'actions',
          title: '버튼 문구',
          description: '상담, 상세 보기, 전화 문의 버튼의 라벨을 관리합니다.',
          blocks: [
            {
              type: 'object',
              path: 'primaryActions.chat',
              title: '상담 버튼',
              fields: [
                { key: 'label', label: '버튼 제목', hint: '예: 카카오톡 문의' },
                { key: 'caption', label: '보조 문구', hint: '예: 빠른 상담 연결' },
              ],
            },
            {
              type: 'object',
              path: 'primaryActions.detail',
              title: '상세 보기 버튼',
              fields: [
                { key: 'label', label: '버튼 제목', hint: '예: 상세페이지 보기' },
                { key: 'caption', label: '보조 문구', hint: '예: 이용 안내 확인' },
              ],
            },
            {
              type: 'object',
              path: 'primaryActions.call',
              title: '전화 버튼',
              fields: [
                { key: 'label', label: '버튼 제목', hint: '예: 전화 문의' },
                { key: 'caption', label: '보조 문구', hint: '예: 대표번호' },
              ],
            },
          ],
        },
        {
          id: 'sections',
          title: '섹션 제목과 설명',
          description: '상세 카드, 재방문 흐름, 알림, 고객센터 섹션 카피입니다.',

      function cloneValue(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function getValueByPath(target, path) {
        return path.split('.').reduce((accumulator, segment) => {
          const key = /^\d+$/.test(segment) ? Number(segment) : segment;
          return accumulator?.[key];
        }, target);
      }

      function setValueByPath(target, path, value) {
        const segments = path.split('.');
        const lastSegment = segments.pop();
        const holder = segments.reduce((accumulator, segment, index) => {
          const key = /^\d+$/.test(segment) ? Number(segment) : segment;
          if (accumulator[key] == null) {
            const nextSegment = segments[index + 1];
            accumulator[key] = /^\d+$/.test(nextSegment) ? [] : {};
          }
          return accumulator[key];
        }, target);
        if (!holder) return;
        const lastKey = /^\d+$/.test(lastSegment) ? Number(lastSegment) : lastSegment;
        holder[lastKey] = value;
      }

      function isHttpUrl(value) {
        return /^https?:\/\//i.test(String(value || '').trim());
      }

      function setStatus(message, options = {}) {
        statusText.textContent = message;
        statusText.classList.remove('dirty', 'error');
        if (options.error) {
          statusText.classList.add('error');
          return;
        }
        if (options.dirty) {
          statusText.classList.add('dirty');
        }
      }

      function markDirty() {
        isDirty = true;
        setStatus('저장되지 않은 변경이 있습니다. 저장하기를 눌러 서버에 반영하세요.', {
          dirty: true,
        });
      }

      function markClean(message) {
        isDirty = false;
        setStatus(message);
      }

      function syncActionButtons() {
        const busy = isLoading || isSaving || isSyncing;
        const pushBusy = isPushLoading || isPushSaving || isPushSending || isPushReceiptSyncing;
        reloadButton.disabled = busy;
        repoSyncButton.disabled = busy || !currentContent;
        saveButton.disabled = busy || !currentContent;
        pushDraftButton.disabled = pushBusy;
        pushSendButton.disabled = pushBusy;
        pushReceiptSyncButton.disabled = pushBusy;
        pushCampaignList
          ?.querySelectorAll('[data-push-send-existing]')
          .forEach((button) => {
            button.disabled = pushBusy;
          });
      }

      function setPushStatus(message, options = {}) {
        if (!pushStatusText) return;
        pushStatusText.textContent = message;
        pushStatusText.classList.remove('dirty', 'error');
        if (options.error) {
          pushStatusText.classList.add('error');
          return;
        }
        if (options.dirty) {
          pushStatusText.classList.add('dirty');
        }
      }

      function createElement(tag, className, text) {
        const element = document.createElement(tag);
        if (className) {
          element.className = className;
        }
        if (text !== undefined) {
          element.textContent = text;
        }
        return element;
      }

      function setInfoTipOpen(wrapper, isOpen) {
        if (!wrapper) return;
        wrapper.dataset.open = isOpen ? 'true' : 'false';
        const button = wrapper.querySelector('.info-button');
        if (button) {
          button.setAttribute('aria-expanded', String(isOpen));
        }
      }

      function closeAllInfoTips(except = null) {
        document.querySelectorAll('.info-wrap[data-open="true"]').forEach((wrapper) => {
          if (except && wrapper === except) return;
          setInfoTipOpen(wrapper, false);
        });
      }

      function createInfoTip(text, label) {
        if (!text) return null;

        const wrapper = createElement('span', 'info-wrap');
        wrapper.dataset.open = 'false';

        const button = createElement('button', 'info-button', '!');
        button.type = 'button';
        button.setAttribute('aria-label', label || '도움말');
        button.setAttribute('aria-expanded', 'false');

        const tooltip = createElement('span', 'info-tooltip', text);
        tooltip.id = `info-tip-${++tooltipIdCounter}`;
        tooltip.setAttribute('role', 'tooltip');

        button.setAttribute('aria-describedby', tooltip.id);

        wrapper.appendChild(button);
        wrapper.appendChild(tooltip);
        return wrapper;
      }

      function openPreviewUrl(url) {
        if (!isHttpUrl(url)) {
          setStatus('https:// 로 시작하는 링크를 넣은 뒤 다시 열어주세요.', { error: true });
          return;
        }
        window.open(url, '_blank', 'noopener,noreferrer');
      }

      function captureOpenSections() {
        document.querySelectorAll('details.section').forEach((element) => {
          const id = element.dataset.sectionId;
          if (element.open) {
            openSections.add(id);
          } else {
            openSections.delete(id);
          }
        });
      }

      function shouldShowFieldHint(field) {
        return field.kind === 'url' || field.kind === 'image';
      }

      function createField(path, field, value) {
        const wrapper = createElement('div', 'field');
        const labelRow = createElement('div', 'label-row');
        const label = createElement('label', '', field.label);
        label.htmlFor = path;
        labelRow.appendChild(label);
        if (field.hint && shouldShowFieldHint(field)) {
          labelRow.appendChild(createInfoTip(field.hint, `${field.label} 도움말`));
        }
        wrapper.appendChild(labelRow);

        const input = document.createElement(field.multiline ? 'textarea' : 'input');
        input.className = field.multiline ? '' : '';
        input.id = path;
        input.dataset.path = path;
        input.value = value ?? '';
        if (!field.multiline && field.kind === 'url') input.inputMode = 'url';
        if (!field.multiline && field.kind === 'tel') input.inputMode = 'tel';
        input.addEventListener('input', () => {
          setValueByPath(currentContent, path, input.value.trim());
          markDirty();
          updateSummary();
        });
        wrapper.appendChild(input);

        if (field.kind === 'url' || field.kind === 'image') {
          const actions = createElement('div', 'field-actions');
          const openButton = createElement(
            'button',
            'button secondary small',
            field.kind === 'image' ? '이미지 열기' : '입력값 미리 열기',
          );
          openButton.type = 'button';
          openButton.addEventListener('click', () => openPreviewUrl(input.value.trim()));
          actions.appendChild(openButton);
          wrapper.appendChild(actions);
        }

        if (field.kind === 'image') {
          const preview = createElement('div', 'preview');
          const image = document.createElement('img');
          image.alt = `${field.label} 미리보기`;
          image.loading = 'lazy';
          const caption = createElement('p', '', '현재 입력값 기준 미리보기입니다.');

          function refreshPreview() {
            const nextUrl = input.value.trim();
            if (!isHttpUrl(nextUrl)) {
              image.removeAttribute('src');
              caption.textContent = 'https:// 로 시작하는 공개 이미지 주소를 넣으면 여기서 바로 확인할 수 있습니다.';
              return;
            }
            image.src = nextUrl;
            caption.textContent = '현재 입력값 기준 미리보기입니다.';
          }

          image.addEventListener('error', () => {
            caption.textContent = '이미지를 불러오지 못했습니다. 주소가 공개 이미지 URL인지 확인하세요.';
          });
          input.addEventListener('input', refreshPreview);
          refreshPreview();
          preview.appendChild(image);
          preview.appendChild(caption);
          wrapper.appendChild(preview);
        }

        return wrapper;
      }

      function renderObjectBlock(block) {
        const panel = createElement('article', 'panel');
        const head = createElement('div', 'panel-head');
        const text = document.createElement('div');
        const titleRow = createElement('div', 'info-row');
        titleRow.appendChild(createElement('div', 'panel-title', block.title));
        text.appendChild(titleRow);
        head.appendChild(text);
        panel.appendChild(head);

        const grid = createElement('div', block.columns === 2 ? 'grid two' : 'grid');
        const target = getValueByPath(currentContent, block.path);
        block.fields.forEach((field) => {
          grid.appendChild(createField(`${block.path}.${field.key}`, field, target[field.key]));
        });
        panel.appendChild(grid);
        return panel;
      }

      function renderStringArrayBlock(block) {
        const panel = createElement('article', 'panel');
        const head = createElement('div', 'panel-head');
        const text = document.createElement('div');
        const titleRow = createElement('div', 'info-row');
        titleRow.appendChild(createElement('div', 'panel-title', block.title));
        text.appendChild(titleRow);
        head.appendChild(text);

        const addButton = createElement('button', 'button primary small', block.addLabel);
        addButton.type = 'button';
        addButton.addEventListener('click', () => {
          captureOpenSections();
          getValueByPath(currentContent, block.path).push(block.template);
          markDirty();
          renderEditor();
        });
        head.appendChild(addButton);
        panel.appendChild(head);

        const stack = createElement('div', 'stack');
        const items = getValueByPath(currentContent, block.path);
        items.forEach((value, index) => {
          const item = createElement('div', 'item');
          const itemHead = createElement('div', 'item-head');
          itemHead.appendChild(createElement('div', 'item-title', `${block.itemLabel} ${index + 1}`));
          const controls = createElement('div', 'item-controls');
          const removeButton = createElement('button', 'button ghost small', '삭제');
          removeButton.type = 'button';
          removeButton.disabled = items.length <= block.minItems;
          removeButton.addEventListener('click', () => {
            if (items.length <= block.minItems) return;
            captureOpenSections();
            items.splice(index, 1);
            markDirty();
            renderEditor();
          });
          controls.appendChild(removeButton);
          itemHead.appendChild(controls);
          item.appendChild(itemHead);

          const field = createElement('div', 'field');
          const labelRow = createElement('div', 'label-row');
          labelRow.appendChild(createElement('label', '', `${block.itemLabel} 문구`));
          if (block.hint && shouldShowFieldHint(block)) {
            labelRow.appendChild(
              createInfoTip(block.hint, `${block.itemLabel} 문구 도움말`),
            );
          }
          field.appendChild(labelRow);
          const input = document.createElement('input');
          input.value = value;
          input.dataset.path = `${block.path}.${index}`;
          input.addEventListener('input', () => {
            setValueByPath(currentContent, input.dataset.path, input.value.trim());
            markDirty();
            updateSummary();
          });
          field.appendChild(input);
          item.appendChild(field);
          stack.appendChild(item);
        });
        if (!items.length) stack.appendChild(createElement('div', 'empty', '항목이 없습니다.'));
        panel.appendChild(stack);
        return panel;
      }

      function renderObjectArrayBlock(block) {
        const panel = createElement('article', 'panel');
        const head = createElement('div', 'panel-head');
        const text = document.createElement('div');
        const titleRow = createElement('div', 'info-row');
        titleRow.appendChild(createElement('div', 'panel-title', block.title));
        text.appendChild(titleRow);
        head.appendChild(text);

        const addButton = createElement('button', 'button primary small', block.addLabel);
        addButton.type = 'button';
        addButton.addEventListener('click', () => {
          captureOpenSections();
          getValueByPath(currentContent, block.path).push(cloneValue(block.template));
          markDirty();
          renderEditor();
        });
        head.appendChild(addButton);
        panel.appendChild(head);

        const stack = createElement('div', 'stack');
        const items = getValueByPath(currentContent, block.path);
        items.forEach((itemValue, index) => {
          const item = createElement('div', 'item');
          const itemHead = createElement('div', 'item-head');
          itemHead.appendChild(createElement('div', 'item-title', `${block.itemLabel} ${index + 1}`));
          const controls = createElement('div', 'item-controls');
          const removeButton = createElement('button', 'button ghost small', '삭제');
          removeButton.type = 'button';
          removeButton.disabled = items.length <= block.minItems;
          removeButton.addEventListener('click', () => {
            if (items.length <= block.minItems) return;
            captureOpenSections();
            items.splice(index, 1);
            markDirty();
            renderEditor();
          });
          controls.appendChild(removeButton);
          itemHead.appendChild(controls);
          item.appendChild(itemHead);

          const grid = createElement('div', 'grid');
          block.fields.forEach((field) => {
            grid.appendChild(
              createField(`${block.path}.${index}.${field.key}`, field, itemValue[field.key]),
            );
          });
          item.appendChild(grid);
          stack.appendChild(item);
        });
        panel.appendChild(stack);
        return panel;
      }

      function renderSection(section, index) {
        const details = createElement('details', 'section');
        details.dataset.sectionId = section.id;
        details.open = openSections.has(section.id) || openSections.size === 0 || index < 2;
        details.addEventListener('toggle', () => {
          if (details.open) openSections.add(section.id);
          else openSections.delete(section.id);
        });

        const summary = createElement('summary', 'section-head');
        const left = document.createElement('div');
        const titleRow = createElement('div', 'info-row');
        titleRow.appendChild(createElement('div', 'section-title', section.title));
        left.appendChild(titleRow);
        summary.appendChild(left);
        summary.appendChild(createElement('div', 'section-badge', `${section.blocks.length}개`));
        details.appendChild(summary);

        const body = createElement('div', 'section-body');
        section.blocks.forEach((block) => {
          if (block.type === 'object') body.appendChild(renderObjectBlock(block));
          else if (block.type === 'string-array') body.appendChild(renderStringArrayBlock(block));
          else body.appendChild(renderObjectArrayBlock(block));
        });
        details.appendChild(body);
        return details;
      }

      function renderQuickNav() {
        if (!navRoot) return;
        navRoot.innerHTML = '';

        const pushButton = createElement('button', 'nav-link');
        pushButton.type = 'button';
        pushButton.appendChild(createElement('span', 'nav-link-title', '푸시 발송'));
        pushButton.addEventListener('click', () => {
          const target = document.querySelector(
            'details.section[data-section-id="push-console"]',
          );
          if (!target) return;
          target.open = true;
          openSections.add('push-console');
          requestAnimationFrame(() => {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
        });
        navRoot.appendChild(pushButton);

        ACTIVE_SECTION_CONFIG.forEach((section) => {
          const button = createElement('button', 'nav-link');
          button.type = 'button';
          button.appendChild(createElement('span', 'nav-link-title', section.title));
          button.addEventListener('click', () => {
            const target = document.querySelector(
              `details.section[data-section-id="${section.id}"]`,
            );
            if (!target) return;
            target.open = true;
            openSections.add(section.id);
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
          navRoot.appendChild(button);
        });
      }

      function getPushFormPayload() {
        const title = String(pushTitleInput?.value || '').trim();
        const message = String(pushMessageInput?.value || '').trim();
        const audienceLabel = String(pushAudienceInput?.value || '').trim() || '푸시 허용 고객';

        if (!title) {
          throw new Error('푸시 제목을 입력하세요.');
        }

        if (!message) {
          throw new Error('푸시 메시지를 입력하세요.');
        }

        return {
          title,
          message,
          audienceLabel,
          scheduledFor: null,
          createdBy: 'admin',
        };
      }

      function fillPushFormFromTemplate(template) {
        if (!template) return;
        pushTitleInput.value = template.title || '';
        pushMessageInput.value = template.message || '';
        setPushStatus('콘텐츠 템플릿 문구를 발송 입력칸에 채웠습니다.');
      }

      function renderPushTemplates() {
        if (!pushTemplateRoot) return;
        pushTemplateRoot.innerHTML = '';

        const templates = Array.isArray(currentContent?.pushCampaigns) ? currentContent.pushCampaigns : [];

        if (!templates.length) {
          pushTemplateRoot.appendChild(createElement('div', 'empty', '등록된 템플릿이 없습니다.'));
          return;
        }

        templates.forEach((template) => {
          const button = createElement('button', 'button secondary small', template.title || '제목 없음');
          button.type = 'button';
          button.addEventListener('click', () => fillPushFormFromTemplate(template));
          pushTemplateRoot.appendChild(button);
        });
      }

      function formatPushCampaignMetrics(campaign) {
        return [
          `대상 ${campaign.deliveryStats.total}`,
          `대기 ${campaign.deliveryStats.pending}`,
          `성공 ${campaign.deliveryStats.success}`,
          `실패 ${campaign.deliveryStats.failed}`,
          `무효 ${campaign.deliveryStats.invalid}`,
        ];
      }

      function renderPushCampaigns() {
        if (!pushCampaignList) return;
        pushCampaignList.innerHTML = '';

        if (!recentPushCampaigns.length) {
          pushCampaignList.appendChild(createElement('div', 'empty', '아직 발송 기록이 없습니다.'));
          return;
        }

        recentPushCampaigns.forEach((campaign) => {
          const row = createElement('article', 'campaign-row');
          const head = createElement('div', 'campaign-row-head');
          const text = document.createElement('div');
          text.appendChild(createElement('div', 'campaign-name', campaign.title));
          text.appendChild(createElement('div', 'campaign-message', campaign.message));
          head.appendChild(text);
          head.appendChild(createElement('div', 'campaign-pill', campaign.status));
          row.appendChild(head);

          const metrics = createElement('div', 'campaign-metrics');
          formatPushCampaignMetrics(campaign).forEach((label) => {
            metrics.appendChild(createElement('span', 'campaign-pill', label));
          });
          row.appendChild(metrics);

          const actions = createElement('div', 'summary-actions');
          if (campaign.status === 'draft') {
            const sendButton = createElement('button', 'button secondary small', '초안 발송');
            sendButton.type = 'button';
            sendButton.dataset.pushSendExisting = campaign.id;
            sendButton.addEventListener('click', () => {
              sendExistingPushCampaign(campaign.id).catch((error) => {
                console.error(error);
                setPushStatus(error.message, { error: true });
              });
            });
            actions.appendChild(sendButton);
          }
          row.appendChild(actions);
          pushCampaignList.appendChild(row);
        });
      }

      async function loadPushCampaigns() {
        if (isPushLoading) return;
        isPushLoading = true;
        syncActionButtons();

        try {
          const response = await fetch('/api/push/campaigns?limit=12');
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          recentPushCampaigns = await response.json();
          renderPushCampaigns();
          if (!isPushSaving && !isPushSending && !isPushReceiptSyncing) {
            setPushStatus('최근 푸시 캠페인 상태를 불러왔습니다.');
          }
        } finally {
          isPushLoading = false;
          syncActionButtons();
        }
      }

      async function createPushDraft() {
        const payload = getPushFormPayload();
        isPushSaving = true;
        syncActionButtons();

        try {
          setPushStatus('푸시 초안을 저장하는 중...');
          const response = await fetch('/api/push/campaigns', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (!response.ok) {
            const failure = await response.json().catch(() => null);
            throw new Error(failure?.message || `HTTP ${response.status}`);
          }

          await loadPushCampaigns();
          setPushStatus('푸시 초안을 저장했습니다.');
        } finally {
          isPushSaving = false;
          syncActionButtons();
        }
      }

      async function sendPushNow() {
        const payload = getPushFormPayload();
        const confirmed = window.confirm(`"${payload.title}" 캠페인을 지금 발송할까요?`);
        if (!confirmed) return;

        isPushSending = true;
        syncActionButtons();

        try {
          setPushStatus('푸시를 발송하는 중...');
          const response = await fetch('/api/push/campaigns/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (!response.ok) {
            const failure = await response.json().catch(() => null);
            throw new Error(failure?.message || `HTTP ${response.status}`);
          }

          const result = await response.json();
          await loadPushCampaigns();
          setPushStatus(
            `발송 완료: 대상 ${result.targetedCount}건, 티켓 ${result.ticketedCount}건, 즉시 실패 ${result.failedCount}건`,
          );
        } finally {
          isPushSending = false;
          syncActionButtons();
        }
      }

      async function sendExistingPushCampaign(campaignId) {
        const confirmed = window.confirm('이 초안 캠페인을 지금 발송할까요?');
        if (!confirmed) return;

        isPushSending = true;
        syncActionButtons();

        try {
          setPushStatus('저장된 초안을 발송하는 중...');
          const response = await fetch(`/api/push/campaigns/${campaignId}/send`, {
            method: 'POST',
          });
          if (!response.ok) {
            const failure = await response.json().catch(() => null);
            throw new Error(failure?.message || `HTTP ${response.status}`);
          }

          const result = await response.json();
          await loadPushCampaigns();
          setPushStatus(
            `초안 발송 완료: 대상 ${result.targetedCount}건, 티켓 ${result.ticketedCount}건, 즉시 실패 ${result.failedCount}건`,
          );
        } finally {
          isPushSending = false;
          syncActionButtons();
        }
      }

      async function syncPushReceipts(force = true) {
        isPushReceiptSyncing = true;
        syncActionButtons();

        try {
          setPushStatus('Expo 발송 결과를 확인하는 중...');
          const response = await fetch('/api/push/receipts/sync', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ force }),
          });
          if (!response.ok) {
            const failure = await response.json().catch(() => null);
            throw new Error(failure?.message || `HTTP ${response.status}`);
          }

          const result = await response.json();
          await loadPushCampaigns();
          setPushStatus(
            `발송 결과 확인 완료: 조회 ${result.checkedCount}건, 반영 ${result.updatedCount}건, 대기 ${result.unresolvedCount}건`,
          );
        } finally {
          isPushReceiptSyncing = false;
          syncActionButtons();
        }
      }

      function updateSummary() {
        if (
          !currentContent ||
          !summaryBrand?.isConnected ||
          !summaryPhone?.isConnected ||
          !summaryDetailUrl?.isConnected ||
          !summaryChatUrl?.isConnected ||
          !summaryDetailButton?.isConnected ||
          !summaryChatButton?.isConnected
        ) {
          return;
        }
        summaryBrand.textContent = currentContent.business.brandName || '-';
        summaryPhone.textContent = currentContent.business.phoneNumber || '-';
        summaryDetailUrl.textContent = currentContent.business.detailPageUrl || '-';
        summaryChatUrl.textContent = currentContent.business.channelTalkUrl || '-';
        summaryDetailButton.onclick = () => openPreviewUrl(currentContent.business.detailPageUrl);
        summaryChatButton.onclick = () => openPreviewUrl(currentContent.business.channelTalkUrl);
      }

      function updateMeta(content) {
        if (schemaBadge) {
          schemaBadge.textContent = `schema v${content.schemaVersion}`;
        }

        if (updatedBadge) {
          updatedBadge.textContent = `updated ${content.updatedAt}`;
        }
      }

      function renderEditor() {
        editorRoot.innerHTML = '';
        ACTIVE_SECTION_CONFIG.forEach((section, index) => {
          editorRoot.appendChild(renderSection(section, index));
        });
        renderQuickNav();
        renderPushTemplates();
        updateSummary();
      }

      function formatSaveError(payload, fallback) {
        if (payload?.issues?.length) {
          const first = payload.issues[0];
          const path = Array.isArray(first.path) ? first.path.join('.') : '입력값';
          return `저장 실패: ${path} - ${first.message}`;
        }
        return fallback;
      }

      async function loadContent() {
        if (isLoading || isSaving || isSyncing) return;
        isLoading = true;
        syncActionButtons();
        try {
          setStatus('서버 내용을 불러오는 중...');
          const response = await fetch('/api/content');
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          currentContent = await response.json();
          updateMeta(currentContent);
          renderEditor();
          await loadPushCampaigns().catch((error) => {
            console.error(error);
            setPushStatus(`푸시 목록 불러오기 실패: ${error.message}`, { error: true });
          });
          markClean('최신 서버 내용을 불러왔습니다.');
        } finally {
          isLoading = false;
          syncActionButtons();
        }
      }

      async function saveContent() {
        if (!currentContent || isLoading || isSaving || isSyncing) return;
        isSaving = true;
        syncActionButtons();
        try {
          setStatus('저장 중...');
          const response = await fetch('/api/content', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(cloneValue(currentContent)),
          });
          if (!response.ok) {
            const payload = await response.json().catch(() => null);
            throw new Error(formatSaveError(payload, payload?.message || `HTTP ${response.status}`));
          }
          currentContent = await response.json();
          updateMeta(currentContent);
          renderEditor();
          await loadPushCampaigns().catch((error) => {
            console.error(error);
            setPushStatus(`푸시 목록 갱신 실패: ${error.message}`, { error: true });
          });
          markClean('저장이 완료되었습니다. 앱에서 새로고침하면 바로 반영됩니다.');
        } finally {
          isSaving = false;
          syncActionButtons();
        }
      }

      async function syncContentFromRepo() {
        if (!currentContent || isLoading || isSaving || isSyncing) return;

        const confirmMessage = isDirty
          ? '저장하지 않은 현재 편집 내용이 사라집니다. 현재 배포된 content/app-content.json 값으로 서버 내용을 덮어쓸까요?'
          : '현재 배포된 content/app-content.json 값으로 서버 내용을 덮어쓸까요?';

        if (!window.confirm(confirmMessage)) {
          return;
        }

        isSyncing = true;
        syncActionButtons();

        try {
          setStatus('배포 기준 내용 반영 중...');
          const response = await fetch('/api/content/sync-from-repo', {
            method: 'POST',
          });

          if (!response.ok) {
            const payload = await response.json().catch(() => null);
            throw new Error(payload?.message || `HTTP ${response.status}`);
          }

          currentContent = await response.json();
          updateMeta(currentContent);
          renderEditor();
          await loadPushCampaigns().catch((error) => {
            console.error(error);
            setPushStatus(`푸시 목록 갱신 실패: ${error.message}`, { error: true });
          });
          markClean('배포된 seed 값으로 서버 내용을 덮어썼습니다.');
        } finally {
          isSyncing = false;
          syncActionButtons();
        }
      }

      reloadButton.addEventListener('click', () => {
        loadContent().catch((error) => {
          console.error(error);
          setStatus(`불러오기 실패: ${error.message}`, { error: true });
        });
      });

      repoSyncButton.addEventListener('click', () => {
        syncContentFromRepo().catch((error) => {
          console.error(error);
          setStatus(error.message, { error: true });
        });
      });

      saveButton.addEventListener('click', () => {
        saveContent().catch((error) => {
          console.error(error);
          setStatus(error.message, { error: true });
        });
      });

      pushDraftButton.addEventListener('click', () => {
        createPushDraft().catch((error) => {
          console.error(error);
          setPushStatus(error.message, { error: true });
        });
      });

      pushSendButton.addEventListener('click', () => {
        sendPushNow().catch((error) => {
          console.error(error);
          setPushStatus(error.message, { error: true });
        });
      });

      pushReceiptSyncButton.addEventListener('click', () => {
        syncPushReceipts(true).catch((error) => {
          console.error(error);
          setPushStatus(error.message, { error: true });
        });
      });

      document.addEventListener('click', (event) => {
        const button = event.target.closest('.info-button');
        if (button) {
          event.preventDefault();
          event.stopPropagation();
          const wrapper = button.closest('.info-wrap');
          const nextState = wrapper.dataset.open !== 'true';
          closeAllInfoTips(wrapper);
          setInfoTipOpen(wrapper, nextState);
          return;
        }

        if (!event.target.closest('.info-wrap')) {
          closeAllInfoTips();
        }
      }, true);

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          closeAllInfoTips();
        }
      });

      window.addEventListener('beforeunload', (event) => {
        if (!isDirty) return;
        event.preventDefault();
        event.returnValue = '';
      });

      syncActionButtons();

      loadContent().catch((error) => {
        console.error(error);
        setStatus(`초기 로딩 실패: ${error.message}`, { error: true });
      });
    </script>
  </body>
</html>
